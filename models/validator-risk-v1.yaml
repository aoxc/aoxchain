api_version: "aoxc.ai/v1"
kind: "ModelManifest"

metadata:
  id: "validator-risk-v1"
  name: "Validator Risk Assessment Model"
  version: "1.0.0"
  description: >
    Runtime-loadable validator admission and peer risk assessment model manifest.
    This manifest defines backend connectivity, inference behavior, policy fusion,
    task bindings, operational controls, and audit metadata.
  owner: "AOXC Core"
  tags:
    - "validator"
    - "risk"
    - "admission"
    - "runtime-loadable"
  created_at: "2026-03-15T00:00:00Z"
  updated_at: "2026-03-15T00:00:00Z"

spec:
  enabled: true

  lifecycle:
    hot_reload: true
    reload_strategy: "graceful"
    immutable_fields:
      - "api_version"
      - "kind"
      - "metadata.id"
      - "backend.type"

  bindings:
    default_for_tasks:
      - "validator_admission"
      - "peer_screening"

    optional_tasks:
      - "transaction_screening"
      - "artifact_inspection"

    node_scopes:
      - "validator"
      - "observer"
      - "gateway"

    tenants: []

  backend:
    type: "remote_http"
    driver: "openai_compatible_json"
    priority: 100
    timeout_ms: 3000
    max_retries: 2
    retry_backoff_ms: 250
    circuit_breaker:
      enabled: true
      failure_threshold: 5
      cooldown_ms: 15000

    remote_http:
      endpoint: "http://127.0.0.1:8088/infer"
      method: "POST"
      headers:
        Content-Type: "application/json"
      auth:
        mode: "bearer_env"
        env_key: "AOXC_AI_REMOTE_KEY"
      tls:
        enabled: false
        verify_peer: false
      rate_limit:
        requests_per_minute: 300
        burst: 50

    local_candle: null
    local_onnx: null
    heuristic: null
    ensemble: null

  input:
    format: "structured_json"
    include_narrative: true
    include_signals: true
    include_findings: true
    include_context_metadata: true
    include_evidence_refs: true
    max_signal_count: 64
    max_finding_count: 32
    max_evidence_refs: 64
    truncate_strategy: "weight_desc"
    signal_encoding: "typed"
    subject:
      required_fields:
        - "subject_id"
        - "subject_kind"
        - "task"
        - "mode"
      optional_fields:
        - "network"
        - "epoch"
        - "lane"
        - "peer_id"
        - "validator_id"
        - "actor_id"

    prompt:
      style: "system_json"
      system_instructions: >
        You are a risk assessment engine for AOXC.
        Produce structured JSON only.
        Evaluate validator and peer admission risk conservatively.
        Prefer review over allow when confidence is low.
        Do not omit rationale.
      narrative_template: |
        Task: {{task}}
        Mode: {{mode}}
        SubjectKind: {{subject_kind}}
        SubjectId: {{subject_id}}

        Context:
        {{context_narrative}}

        Signals:
        {{signals_narrative}}

        Findings:
        {{findings_narrative}}

  output:
    format: "normalized_json"
    required_fields:
      - "label"
      - "risk_bps"
      - "confidence_bps"
      - "rationale"
    optional_fields:
      - "recommended_action"
      - "attributes"
      - "model_version"
      - "trace_id"

    mapping:
      label_field: "label"
      risk_bps_field: "risk_bps"
      confidence_bps_field: "confidence_bps"
      rationale_field: "rationale"
      recommended_action_field: "recommended_action"
      attributes_field: "attributes"

    validation:
      allowed_labels:
        - "trusted"
        - "review"
        - "suspicious"
        - "malicious"
        - "unknown"
      risk_bps_min: 0
      risk_bps_max: 10000
      confidence_bps_min: 0
      confidence_bps_max: 10000
      on_invalid_output: "fallback_review"

  decision:
    mode: "enforced"

    thresholds:
      allow_max_risk_bps: 2499
      review_max_risk_bps: 6999
      deny_min_risk_bps: 7000

    confidence:
      minimum_confidence_bps: 3500
      low_confidence_action: "review"

    fusion:
      strategy: "weighted"
      weights:
        model_risk_bps: 6000
        deterministic_risk_bps: 4000
      deterministic_overrides:
        deny_on_critical_finding: true
        deny_on_revoked_identity: true
        deny_on_invalid_quorum_proof: true
        review_on_missing_context: true
        review_on_model_timeout: true

    actions:
      trusted: "allow"
      review: "review"
      suspicious: "review"
      malicious: "deny"
      unknown: "review"

  fallback:
    enabled: true
    backend: "heuristic_default"
    action_on_backend_error: "review"
    action_on_timeout: "review"
    action_on_schema_error: "review"
    action_on_unreachable_backend: "review"
    action_on_empty_response: "review"

  observability:
    metrics:
      enabled: true
      namespace: "aoxc_ai"
      labels:
        model_id: "validator-risk-v1"
        backend_type: "remote_http"
    tracing:
      enabled: true
      include_request_hash: true
      include_subject_id: true
      include_backend_latency: true
    audit:
      enabled: true
      log_decision_input: false
      log_decision_output: true
      redact_fields:
        - "auth"
        - "headers.Authorization"
        - "metadata.secret"
        - "context.private_key"
      persist_reports: true
      persist_path: "./state/aoxcai/reports"

  security:
    manifest_signature:
      required: false
      algorithm: "ed25519"
      public_key_path: null
      signature_field: "signature"
    allowed_endpoints:
      - "http://127.0.0.1:8088/infer"
    allow_private_networks: true
    allow_file_backends: false

  compatibility:
    min_node_version: "0.0.0-alpha.1"
    max_node_version: null
    supported_tasks:
      - "validator_admission"
      - "peer_screening"
      - "transaction_screening"
      - "artifact_inspection"
    supported_modes:
      - "advisory"
      - "enforced"

  extensions: {}
