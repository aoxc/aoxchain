# =============================================================================
# AOXCHAIN - Supply Chain Security & Dependency Governance Policy
# =============================================================================
# Purpose:
# This configuration enforces strict dependency hygiene, mitigates supply chain
# vulnerabilities, ensures legal license compliance, and maintains source
# provenance across the AOXChain ecosystem.
#
# Governance Protocol:
# 1. Zero-Trust: All transitive dependencies are evaluated under the maximum
#    feature set.
# 2. Accountability: Dependency exceptions are explicit and intentionally scoped.
# 3. Remediation: Temporary exceptions must be revisited as upstream fixes land.
# =============================================================================

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"

# Keep this empty unless cargo deny reports an actually encountered advisory
# that is consciously risk-accepted for a limited period.
ignore = []

[licenses]
version = 2
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "Unicode-3.0",
  "Zlib",
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "deny"

skip = [
  { crate = "block-buffer" },
  { crate = "core-foundation" },
  { crate = "cpufeatures" },
  { crate = "crypto-common" },
  { crate = "digest" },
  { crate = "getrandom" },
  { crate = "keccak" },
  { crate = "r-efi" },
  { crate = "rand" },
  { crate = "rand_chacha" },
  { crate = "rand_core" },
  { crate = "sha2" },
  { crate = "sha3" },
  { crate = "thiserror" },
  { crate = "thiserror-impl" },
  { crate = "windows-sys" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
