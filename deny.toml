# cargo-deny configuration file
# Save this as `deny.toml` in your project root

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
# Ignoring unmaintained crates that are currently unavoidable
# (mostly originating from Tauri and its GTK3/WebKit dependencies)
ignore = [
    "RUSTSEC-2024-0370", # proc-macro-error
    "RUSTSEC-2024-0380", # pqcrypto-dilithium
    "RUSTSEC-2024-0411", # gdkwayland-sys
    "RUSTSEC-2024-0412", # gdk
    "RUSTSEC-2024-0413", # atk
    "RUSTSEC-2024-0414", # gdkx11-sys
    "RUSTSEC-2024-0415", # gtk
    "RUSTSEC-2024-0416", # atk-sys
    "RUSTSEC-2024-0417", # gdkx11
    "RUSTSEC-2024-0418", # gdk-sys
    "RUSTSEC-2024-0419", # gtk3-macros
    "RUSTSEC-2024-0420", # gtk-sys
    "RUSTSEC-2025-0057", # fxhash
    "RUSTSEC-2025-0075", # unic-char-range
    "RUSTSEC-2025-0080", # unic-common
    "RUSTSEC-2025-0081", # unic-char-property
    "RUSTSEC-2025-0098", # unic-ucd-version
    "RUSTSEC-2025-0100", # unic-ucd-ident
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception", # Required by target-lexicon
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",            # Required by webpki-roots
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
]
# Ignore missing licenses for local workspace crates.
# IMPORTANT: Your local crates (aoxcai, aoxcdata, etc.) MUST have 
# `publish = false` in their Cargo.toml files for this to work.
private = { ignore = true }

[bans]
multiple-versions = "allow"
# Allowed to fix the "wildcard dependencies" errors caused by 
# using `path = "../crate"` without specifying a version.
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
