name: Release Binaries Matrix

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-binaries:
    name: Build ${{ matrix.os }} binaries
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --bin aoxc --bin aoxchub --bin aoxckit

      - name: Package binaries for artifact upload
        shell: bash
        run: |
          set -euo pipefail
          os_name="${{ runner.os }}"
          case "${os_name}" in
            Linux) platform="linux-amd64"; exe_suffix="" ;;
            macOS) platform="macos-amd64"; exe_suffix="" ;;
            Windows) platform="windows-amd64"; exe_suffix=".exe" ;;
            *) echo "Unsupported runner OS: ${os_name}"; exit 2 ;;
          esac

          mkdir -p "release-artifacts/${platform}"
          cp "target/release/aoxc${exe_suffix}" "release-artifacts/${platform}/"
          cp "target/release/aoxchub${exe_suffix}" "release-artifacts/${platform}/"
          cp "target/release/aoxckit${exe_suffix}" "release-artifacts/${platform}/"

      - name: Upload release binaries
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries-${{ runner.os }}
          path: release-artifacts/
          if-no-files-found: error
          retention-days: 14
