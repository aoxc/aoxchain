name: CI

on:
  pull_request:
    branches:
      - main
      - master
      - work
      - develop
  push:
    branches:
      - main
      - master
      - work
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 10
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  RUST_BACKTRACE: 1

defaults:
  run:
    shell: bash

jobs:
  testnet-readiness:
    name: Testnet readiness gate
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: Verify testnet readiness script
        run: |
          set -euo pipefail
          test -f ./scripts/validation/testnet_readiness_gate.sh
          chmod +x ./scripts/validation/testnet_readiness_gate.sh
          test -f ./scripts/validation/persistent_testnet_gate.sh
          chmod +x ./scripts/validation/persistent_testnet_gate.sh

      - name: Run testnet readiness gate
        run: |
          set -euo pipefail
          make --no-print-directory testnet-readiness-gate

      - name: Install cargo-llvm-cov
        run: |
          set -euo pipefail
          cargo install cargo-llvm-cov --locked

      - name: Generate coverage artifact (aoxcai)
        run: |
          set -euo pipefail
          mkdir -p artifacts/coverage
          cargo llvm-cov -p aoxcai --all-features --lcov --output-path artifacts/coverage/aoxcai.lcov --summary-only

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aoxcai-coverage
          path: artifacts/coverage/
          if-no-files-found: ignore
          retention-days: 14

  quick-gate:
    name: Quick quality gate (core workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: Verify quick gate script
        run: |
          set -euo pipefail
          test -f ./scripts/quality_gate.sh
          chmod +x ./scripts/quality_gate.sh

      - name: Run quick quality gate
        run: |
          set -euo pipefail
          ./scripts/quality_gate.sh quick

  full-gate:
    name: Full quality gate (core workspace)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs:
      - quick-gate
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: Verify full gate script
        run: |
          set -euo pipefail
          test -f ./scripts/quality_gate.sh
          chmod +x ./scripts/quality_gate.sh

      - name: Run full quality gate
        run: |
          set -euo pipefail
          ./scripts/quality_gate.sh full

  desktop-gate:
    name: Desktop Tauri gate
    runs-on: ubuntu-latest
    needs:
      - quick-gate
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: Install Linux desktop build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config

      - name: Verify desktop gate script
        run: |
          set -euo pipefail
          test -f ./scripts/quality_gate.sh
          chmod +x ./scripts/quality_gate.sh

      - name: Run desktop gate
        run: |
          set -euo pipefail
          ./scripts/quality_gate.sh desktop

  readiness-report:
    name: Readiness report
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs:
      - testnet-readiness
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: Verify readiness scripts
        run: |
          set -euo pipefail
          test -f ./scripts/release/generate_release_evidence.sh
          test -f ./scripts/validation/persistent_testnet_gate.sh
          chmod +x ./scripts/release/generate_release_evidence.sh
          chmod +x ./scripts/validation/persistent_testnet_gate.sh

      - name: Generate release evidence
        run: |
          set -euo pipefail
          ./scripts/release/generate_release_evidence.sh

      - name: Run readiness gate
        run: |
          set -euo pipefail
          make --no-print-directory testnet-readiness-gate

      - name: Upload readiness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: readiness-report
          path: |
            release/
            reports/
            artifacts/
            evidence/
          if-no-files-found: ignore
          retention-days: 14
