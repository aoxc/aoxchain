name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - work

jobs:
  quick-gate:
    name: Quick quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run quick quality gate
        run: ./scripts/quality_gate.sh quick

  full-gate:
    name: Full quality gate
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run full quality gate
        run: ./scripts/quality_gate.sh full
