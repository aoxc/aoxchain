[package]
name = "aoxcmd"
version = "0.0.0-alpha.1"
edition = "2021"
default-run = "aoxc"
build = "build.rs"
license = "MIT"
description = "AOXC operator command plane with audit-oriented diagnostics and bootstrap workflows."

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
thiserror = "2.0"
sha2 = "0.10"
sha3 = "0.10"
hex = "0.4"
chrono = { version = "0.4", features = ["serde", "clock"] }
aoxcunity = { path = "../aoxcunity" }
aoxcai = { path = "../aoxcai" }
aoxcore = { path = "../aoxcore" }

[build-dependencies]
sha2 = "0.10"
hex = "0.4"

[[bin]]
name = "aoxc"
path = "src/main.rs"
