<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AOXCHub Operator Console</title>
  <link rel="stylesheet" href="/assets/app.css" />
</head>
<body data-env="mainnet">
  <header class="topbar glass">
    <div>
      <h1>AOXCHub</h1>
      <p>Local-only AOXChain operator control plane</p>
    </div>
    <div class="badge">127.0.0.1 only</div>
  </header>

  <main class="grid">
    <section class="panel hero glass">
      <h2>Environment Selection</h2>
      <div class="env-grid">
        <button id="env-mainnet" class="env mainnet">MAINNET</button>
        <button id="env-testnet" class="env testnet">TESTNET</button>
      </div>
      <div id="env-banner" class="banner">MAINNET • PRODUCTION CONTROL SURFACE</div>
    </section>

    <section class="panel glass">
      <h3>Binary Source Status</h3>
      <div class="row">
        <select id="binary-select"></select>
      </div>
      <div class="row">
        <input id="custom-binary" placeholder="/path/to/custom/test/binary" />
        <button id="add-custom">Add Testnet Binary</button>
      </div>
      <pre id="binary-details" class="preview"></pre>
    </section>

    <section class="panel glass">
      <h3>Command Catalog</h3>
      <div id="commands" class="cards"></div>
    </section>

    <section class="panel glass">
      <h3>Command Preview</h3>
      <div id="selected-label"></div>
      <pre id="preview" class="preview"></pre>
      <button id="execute" class="cta" disabled>Confirm and Execute</button>
    </section>

    <section class="panel terminal glass">
      <h3>Terminal Activity</h3>
      <pre id="terminal"></pre>
    </section>
  </main>

  <script src="/assets/app.js"></script>
</body>
</html>
