# AOXC Release Policy - Testnet

[policy]
schema_version = 1
environment = "testnet"
display_name = "AOXC PUSULA"
release_tier = "pre-production"
status = "active"

[identity]
family_id = 2626
network_serial = "2626-002"
chain_id = 2626010001
network_id = "aoxc-testnet-2626-002"

[gates]
require_fmt = true
require_clippy = true
require_tests = true
require_manifest_validation = true
require_genesis_hash_validation = true
require_registry_consistency = true
require_release_evidence = true
require_signed_artifacts = true
require_certificate_presence = true

[promotion]
