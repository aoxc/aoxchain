# AOXChain advanced consensus hardening policy template.

version = 1
policy_name = "advanced-hardened"

[finality]
algorithm = "bft_deterministic"
min_commit_threshold = "2f+1"
max_reorg_depth = 0
enable_equivocation_evidence = true

[slashing]
enabled = true
double_sign = "critical"
invalid_vote = "critical"
liveness_fault = "major"
penalty_mode = "governance_profile"

[committee]
rotation = "epoch"
entropy_source = "kernel_vrf"
allow_emergency_freeze = true

[crypto_agility]
enabled = true
active_suite = "ed25519"
allowed_suites = ["ed25519", "hybrid_ed25519_dilithium"]
require_suite_negotiation = true
downgrade_policy = "fail_closed"

[pqc_transition]
mode = "staged"
hybrid_signatures_enabled = false
activation_requires_governance = true
rollback_requires_evidence = true

[network_guardrails]
validator_rpc_cohost_forbidden = true
bridge_with_validator_keys_forbidden = true
require_plane_isolation = true

[governance_multisig]
enabled = true
policy = "weighted-threshold"
approval_threshold = "2f+1"
min_signers = 3
require_hardware_backed_keys = true
require_domain_separated_signatures = true
rotation_requires_multisig = true
emergency_override = "forbidden"
