# Canonical testnet preset.
# Keep top-level fields for compatibility with existing scripts.

chain_id = "aox-testnet-1"
listen_addr = "0.0.0.0:36656"
rpc_addr = "0.0.0.0:18545"
security_mode = "audit_strict"
consensus_profile = "aoxcq-preprod"
crypto_profile = "hybrid_pq"
quantum_policy = "configs/quantum-resilience-policy.toml"

peers = [
  "seed-1.aoxc.net:36656",
  "seed-2.aoxc.net:36656",
]

feature_flags = [
  "state-sync-v2",
  "telemetry-extended",
  "rpc-trace",
  "fault-injection-guarded",
]

[identity]
network_kind = "testnet"
network_id = "AOX-TESTNET"
operator_change_control = "required"

[network]
transport = "tcp+quic"
p2p_max_peers = 80
rpc_max_connections = 150

[consensus]
engine = "aoxcq_hybrid_bft"
finality_target_seconds = 4
min_validator_uptime = 0.95

[security]
key_rotation_days = 21
require_attestation = true
require_binary_provenance = true
