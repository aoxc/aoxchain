# AOXC Release Policy - Mainnet

[policy]
schema_version = 1
environment = "mainnet"
display_name = "AOXC AKDENIZ"
release_tier = "production"
status = "active"

[identity]
family_id = 2626
network_serial = "2626-001"
chain_id = 2626000001
network_id = "aoxc-mainnet-2626-001"

[gates]
require_fmt = true
require_clippy = true
require_tests = true
require_manifest_validation = true
require_genesis_hash_validation = true
require_registry_consistency = true
require_release_evidence = true
require_signed_artifacts = true
require_certificate_presence = true

[promotion]
allow_release = true
allow_unsigned_release = false
allow_manifest_identity_override = false
allow_chain_id_override = false
allow_network_id_override = false

[topology_minimums]
minimum_validators = 4
minimum_bootnodes = 3
