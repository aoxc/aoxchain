# AOXChain topology activation profile for mainnet.
version = 1
environment = "mainnet"
default_deny = true

[activation]
mode = "policy_gated"
require_validator_governance = true

# Production node activation:
# - all roles are defined and enabled,
# - runtime admission remains policy-gated,
# - quantum-sensitive roles are assigned explicit assurance tiers.
[roles.core_val]
enabled = true
quantum_tier = "q2_hybrid_required"

[roles.core_prop]
enabled = true

[roles.core_guard]
enabled = true

[roles.net_relay]
enabled = true
quantum_tier = "q1_classical_compatible"

[roles.net_gate]
enabled = true
quantum_tier = "q1_classical_compatible"

[roles.data_arch]
enabled = true

[roles.data_da]
enabled = true

[roles.serv_rpc]
enabled = true
quantum_tier = "q1_classical_compatible"

[roles.serv_idx]
enabled = true
quantum_tier = "q1_classical_compatible"

[roles.sec_sent]
enabled = true
quantum_tier = "q3_evidence_hardened"

[roles.x_orcl]
enabled = true

[roles.x_bridge]
enabled = true

[roles.core_qc]
enabled = true

[roles.core_qv]
enabled = true

[roles.sec_evd]
enabled = true

[roles.net_pacer]
enabled = true
