# AOXChain topology activation profile for validation.
version = 1
environment = "validation"
default_deny = true

[activation]
mode = "policy_gated"
require_validator_governance = true

[roles.core_val]
enabled = true

[roles.core_prop]
enabled = true

[roles.core_guard]
enabled = true

[roles.net_relay]
enabled = true

[roles.net_gate]
enabled = true

[roles.data_arch]
enabled = true

[roles.data_da]
enabled = true

[roles.serv_rpc]
enabled = true

[roles.serv_idx]
enabled = true

[roles.sec_sent]
enabled = true

[roles.x_orcl]
enabled = true

[roles.x_bridge]
enabled = true

[roles.core_qc]
enabled = true

[roles.core_qv]
enabled = true

[roles.sec_evd]
enabled = true

[roles.net_pacer]
enabled = true
